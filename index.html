<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIZQUNA - PWA</title>
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; min-height: 100vh; color: #1a202c; padding-bottom: 80px; }
        :root { --primary: #3b82f6; --primary-dark: #2563eb; --shadow: 0 4px 12px rgba(0,0,0,0.06); }

        /* --- HEADER MOBILE --- */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: white;
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .app-header .logo { font-weight: 700; font-size: 18px; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .app-header .logo i { color: var(--primary); }
        .app-header .date { font-size: 12px; color: #64748b; background: #f1f5f9; padding: 4px 12px; border-radius: 20px; }

        /* --- BANNER --- */
        .banner {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white; padding: 24px 24px; border-radius: 0 0 20px 20px;
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .banner h2 { font-size: 22px; font-weight: 700; }
        .banner p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .banner i { position: absolute; right: 10px; bottom: -20px; font-size: 100px; opacity: 0.1; }

        /* --- STATS GRID MOBILE --- */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding: 0 16px; margin-bottom: 20px;
        }
        .stat-card {
            background: white; padding: 16px; border-radius: 16px;
            box-shadow: var(--shadow); color: white; position: relative;
        }
        .stat-card:nth-child(1) { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-size: 20px; font-weight: 700; margin-top: 4px; }
        .stat-change { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 12px; display: inline-block; margin-top: 4px; }

        /* --- SECTION --- */
        .section { padding: 0 16px; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        /* --- WIDGET --- */
        .widget { background: white; border-radius: 16px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .widget-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .widget-sub { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }

        .chart-area { height: 100px; display: flex; align-items: flex-end; gap: 6px; }
        .bar { flex: 1; background: var(--primary); border-radius: 6px 6px 0 0; min-height: 10px; }
        .bar:nth-child(even) { background: #8b5cf6; }

        /* --- BUKU KAS CARD --- */
        .buku-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .buku-card {
            background: white; padding: 14px; border-radius: 14px;
            box-shadow: var(--shadow); border-left: 4px solid var(--primary);
            display: flex; align-items: center; gap: 12px;
        }
        .buku-card .icon { font-size: 24px; }
        .buku-card .info { flex: 1; overflow: hidden; }
        .buku-card .nama { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .buku-card .saldo { font-size: 16px; font-weight: 700; }
        .buku-card-add {
            border: 2px dashed #3b82f6; background: white; justify-content: center;
            color: #3b82f6; cursor: pointer;
        }

        /* --- ACTIVITY --- */
        .activity-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .activity-item:last-child { border-bottom: none; }
        .icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; color: white; flex-shrink: 0; }
        .act-info { flex: 1; min-width: 0; }
        .act-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .act-date { font-size: 11px; color: #94a3b8; }
        .act-amount { font-weight: 600; font-size: 13px; white-space: nowrap; }

        /* --- UTANG PIUTANG --- */
        .up-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .up-card { background: white; border-radius: 14px; padding: 12px; box-shadow: var(--shadow); }
        .up-card .title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .up-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .up-item:last-child { border-bottom: none; }
        .tag-status { font-size: 10px; padding: 2px 8px; border-radius: 12px; }
        .tag-lunas { background: #d1fae5; color: #059669; }
        .tag-bayar { background: #fee2e2; color: #dc2626; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; display: flex; justify-content: space-around;
            padding: 8px 0 16px 0; border-top: 1px solid #e2e8f0;
            z-index: 200;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; text-decoration: none; font-size: 10px; gap: 2px;
            cursor: pointer; transition: 0.2s;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary); }

        /* --- PAGE --- */
        .page { display: none; }
        .page.active { display: block; }

        /* --- MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.6); display: none; justify-content: center; align-items: center;
            z-index: 500; backdrop-filter: blur(4px);
        }
        .modal.open { display: flex; }
        .modal-box {
            background: white; width: 90%; max-width: 400px;
            border-radius: 16px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { text-align: center; font-size: 18px; margin-bottom: 16px; }
        .modal-box label { display: block; font-size: 13px; font-weight: 600; margin-top: 10px; }
        .modal-box input, .modal-box select {
            width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px;
            font-size: 14px; margin-top: 4px; background: #f8fafc;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .modal-actions .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-cancel { background: #e2e8f0; color: #475569; }
        .btn-sm { padding: 4px 12px; font-size: 11px; }

        /* --- RESPONSIVE TABLET --- */
        @media (min-width: 640px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .buku-grid { grid-template-columns: repeat(3, 1fr); }
            .up-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="app-header">
        <div class="logo"><i class="fas fa-rocket"></i> RIZQUNA</div>
        <div class="date"><span id="tanggalHariIni"></span></div>
    </div>

    <!-- ===== HALAMAN DASHBOARD ===== -->
    <div id="page-dashboard" class="page active">
        <div class="banner">
            <h2>Selamat Datang, Rizquna!</h2>
            <p>Pantau kesehatan finansial Anda dari mana saja.</p>
            <i class="fas fa-rocket"></i>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="section">
            <div class="section-title"><i class="fas fa-chart-line" style="color:var(--primary);"></i> Arus Kas</div>
            <div class="widget">
                <div class="chart-area" id="chartArea"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-bolt" style="color:#8b5cf6;"></i> Aktivitas Terbaru</div>
            <div class="widget" id="recentActivityList"></div>
        </div>
    </div>

    <!-- ===== HALAMAN BUKU KAS ===== -->
    <div id="page-buku-kas" class="page">
        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div class="section-title" style="margin-bottom:0;"><i class="fas fa-wallet" style="color:var(--primary);"></i> Buku Kas</div>
                <button class="btn btn-primary btn-sm" onclick="openModal('buku')"><i class="fas fa-plus"></i> Tambah</button>
            </div>
            <div class="buku-grid" id="bukuListGrid"></div>
        </div>

        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div class="section-title" style="margin-bottom:0;">Daftar Transaksi</div>
                <button class="btn btn-primary btn-sm" onclick="openModal('transaksi')"><i class="fas fa-plus"></i> Tambah</button>
            </div>
            <div class="widget" id="transaksiTableContainer"></div>
        </div>
    </div>

    <!-- ===== HALAMAN UTANG PIUTANG ===== -->
    <div id="page-utang-piutang" class="page">
        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div class="section-title" style="margin-bottom:0;"><i class="fas fa-handshake" style="color:#8b5cf6;"></i> Utang & Piutang</div>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-primary btn-sm" onclick="openModal('utang')">+ Utang</button>
                    <button class="btn btn-primary btn-sm" onclick="openModal('piutang')">+ Piutang</button>
                </div>
            </div>
            <div class="up-grid">
                <div class="up-card"><div class="title">📋 Utang</div><div id="listUtang"></div></div>
                <div class="up-card"><div class="title">📋 Piutang</div><div id="listPiutang"></div></div>
            </div>
        </div>
    </div>

    <!-- ===== HALAMAN LAPORAN ===== -->
    <div id="page-laporan" class="page">
        <div class="section">
            <div class="section-title"><i class="fas fa-chart-pie" style="color:var(--primary);"></i> Laporan Keuangan</div>
            <div class="stats-grid" id="laporanStats" style="margin-bottom:12px;">
                <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value" id="totalPemasukan">Rp0</div></div>
                <div class="stat-card"><div class="stat-label">Pengeluaran</div><div class="stat-value" id="totalPengeluaran">Rp0</div></div>
                <div class="stat-card"><div class="stat-label">Saldo</div><div class="stat-value" id="saldoAkhirLaporan">Rp0</div></div>
                <div class="stat-card"><div class="stat-label">Transaksi</div><div class="stat-value" id="totalTransaksiLaporan">0</div></div>
            </div>
            <div class="widget" id="laporanTableBody"></div>
        </div>
    </div>

    <!-- ===== NAVIGASI BAWAH ===== -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('dashboard')"><i class="fas fa-home"></i><span>Dashboard</span></div>
        <div class="nav-item" onclick="showPage('buku-kas')"><i class="fas fa-wallet"></i><span>Buku Kas</span></div>
        <div class="nav-item" onclick="showPage('utang-piutang')"><i class="fas fa-handshake"></i><span>Utang</span></div>
        <div class="nav-item" onclick="showPage('laporan')"><i class="fas fa-chart-pie"></i><span>Laporan</span></div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="modalTransaksi">
        <div class="modal-box">
            <h3 id="modalTitle">Form</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" id="modalSaveBtn" onclick="saveModal()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- ===== SUPABASE CDN ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==================== SUPABASE ====================
        const SUPABASE_URL = 'https://tfnwifktbjfpbbxkumik.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbndpZmt0YmpmcGJieGt1bWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjY5NjksImV4cCI6MjA5NjAwMjk2OX0.EvPtd7Y2S9PwhV4eq1B-b7-_IlsAwHSChjhUReHFQ1M';
        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== UTILITY ====================
        function formatRupiah(angka) { return 'Rp' + angka.toLocaleString('id-ID'); }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
        function getBukuName(id, bukuList) { const b = bukuList.find(b => b.id === id); return b ? b.nama : '-'; }

        // ==================== NAVIGASI ====================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            // Highlight nav
            const navItems = document.querySelectorAll('.nav-item');
            if (pageId === 'dashboard') navItems[0].classList.add('active');
            else if (pageId === 'buku-kas') navItems[1].classList.add('active');
            else if (pageId === 'utang-piutang') navItems[2].classList.add('active');
            else if (pageId === 'laporan') navItems[3].classList.add('active');
            refreshCurrentPage();
        }

        // ==================== RENDER ====================
        async function renderDashboard() {
            const { data: buku, error: e1 } = await supabase.from('buku_kas').select('*');
            const { data: transaksi, error: e2 } = await supabase.from('transaksi').select('*');
            if (e1 || e2) { 
                document.getElementById('statsGrid').innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">Memuat data...</div>';
                return; 
            }

            const totalSaldo = buku.reduce((s, b) => s + (b.saldo || 0), 0);
            const totalPemasukan = transaksi.filter(t => t.tipe === 'masuk').reduce((s, t) => s + (t.nominal || 0), 0);
            const totalPengeluaran = transaksi.filter(t => t.tipe === 'keluar').reduce((s, t) => s + (t.nominal || 0), 0);
            const totalUtang = (await supabase.from('utang_piutang').select('*').eq('tipe', 'utang').eq('lunas', false)).data?.reduce((s, u) => s + (u.nominal || 0), 0) || 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total Saldo</div><div class="stat-value">${formatRupiah(totalSaldo)}</div><span class="stat-change">+12%</span></div>
                <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatRupiah(totalPemasukan)}</div><span class="stat-change">+8%</span></div>
                <div class="stat-card"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatRupiah(totalPengeluaran)}</div><span class="stat-change">-2%</span></div>
                <div class="stat-card"><div class="stat-label">Utang Aktif</div><div class="stat-value">${formatRupiah(totalUtang)}</div><span class="stat-change">0%</span></div>
            `;

            // Chart
            const heights = [30,60,45,80,90,50,70,40];
            document.getElementById('chartArea').innerHTML = heights.map(h => `<div class="bar" style="height:${h}%;"></div>`).join('');

            // Activity
            const sorted = transaksi.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal)).slice(0,5);
            const container = document.getElementById('recentActivityList');
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">Belum ada transaksi</div>';
            } else {
                container.innerHTML = sorted.map(t => {
                    const isIncome = t.tipe === 'masuk';
                    return `
                        <div class="activity-item">
                            <div class="icon-circle" style="background:${isIncome ? '#10b981' : '#ef4444'};">
                                <i class="fas ${isIncome ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                            </div>
                            <div class="act-info">
                                <div class="act-title">${t.deskripsi || t.kategori}</div>
                                <div class="act-date">${getBukuName(t.buku_id, buku)} • ${new Date(t.tanggal).toLocaleString('id-ID')}</div>
                            </div>
                            <div class="act-amount" style="color:${isIncome ? '#10b981' : '#ef4444'};">
                                ${isIncome ? '+' : '-'}${formatRupiah(t.nominal)}
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        async function renderBukuKasList() {
            const { data: buku, error } = await supabase.from('buku_kas').select('*');
            if (error) return;

            const grid = document.getElementById('bukuListGrid');
            grid.innerHTML = buku.map(b => `
                <div class="buku-card" style="border-left-color:${['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444'][buku.indexOf(b)%5]};">
                    <div class="icon" style="color:${['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444'][buku.indexOf(b)%5]};"><i class="fas ${b.icon || 'fa-university'}"></i></div>
                    <div class="info">
                        <div class="nama">${b.nama}</div>
                        <div class="saldo">${formatRupiah(b.saldo || 0)}</div>
                    </div>
                </div>
            `).join('') + `
                <div class="buku-card buku-card-add" onclick="openModal('buku')">
                    <i class="fas fa-plus-circle"></i>
                    <span>Tambah</span>
                </div>
            `;
        }

        async function renderTransaksiTable() {
            const { data: transaksi, error } = await supabase.from('transaksi').select('*').order('tanggal', { ascending: false });
            if (error) return;
            const { data: buku } = await supabase.from('buku_kas').select('*');

            const container = document.getElementById('transaksiTableContainer');
            if (transaksi.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">Belum ada transaksi</div>';
                return;
            }
            container.innerHTML = transaksi.slice(0,10).map(t => `
                <div class="activity-item">
                    <div class="act-info">
                        <div class="act-title">${t.deskripsi || t.kategori}</div>
                        <div class="act-date">${getBukuName(t.buku_id, buku)} • ${new Date(t.tanggal).toLocaleString('id-ID')}</div>
                    </div>
                    <div class="act-amount" style="color:${t.tipe === 'masuk' ? '#10b981' : '#ef4444'};">
                        ${t.tipe === 'masuk' ? '+' : '-'}${formatRupiah(t.nominal)}
                    </div>
                </div>
            `).join('');
        }

        async function renderUtangPiutang() {
            const { data: utang } = await supabase.from('utang_piutang').select('*').eq('tipe', 'utang');
            const { data: piutang } = await supabase.from('utang_piutang').select('*').eq('tipe', 'piutang');

            document.getElementById('listUtang').innerHTML = (utang?.length === 0) ? '<div style="color:#94a3b8;font-size:13px;">Belum ada</div>' :
                utang.map(u => `
                    <div class="up-item">
                        <span>${u.nama}</span>
                        <span>${formatRupiah(u.nominal)} <span class="tag-status ${u.lunas ? 'tag-lunas' : 'tag-bayar'}">${u.lunas ? 'Lunas' : 'Belum'}</span></span>
                    </div>
                `).join('');

            document.getElementById('listPiutang').innerHTML = (piutang?.length === 0) ? '<div style="color:#94a3b8;font-size:13px;">Belum ada</div>' :
                piutang.map(p => `
                    <div class="up-item">
                        <span>${p.nama}</span>
                        <span>${formatRupiah(p.nominal)} <span class="tag-status ${p.lunas ? 'tag-lunas' : 'tag-bayar'}">${p.lunas ? 'Lunas' : 'Belum'}</span></span>
                    </div>
                `).join('');
        }

        async function renderLaporan() {
            const { data: transaksi } = await supabase.from('transaksi').select('*');
            const { data: buku } = await supabase.from('buku_kas').select('*');

            const totalPemasukan = transaksi.filter(t => t.tipe === 'masuk').reduce((s, t) => s + (t.nominal || 0), 0);
            const totalPengeluaran = transaksi.filter(t => t.tipe === 'keluar').reduce((s, t) => s + (t.nominal || 0), 0);
            const saldoAkhir = buku.reduce((s, b) => s + (b.saldo || 0), 0);

            document.getElementById('totalPemasukan').textContent = formatRupiah(totalPemasukan);
            document.getElementById('totalPengeluaran').textContent = formatRupiah(totalPengeluaran);
            document.getElementById('saldoAkhirLaporan').textContent = formatRupiah(saldoAkhir);
            document.getElementById('totalTransaksiLaporan').textContent = transaksi.length;

            const sorted = transaksi.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
            const container = document.getElementById('laporanTableBody');
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">Belum ada transaksi</div>';
                return;
            }
            container.innerHTML = sorted.map(t => `
                <div class="activity-item">
                    <div class="act-info">
                        <div class="act-title">${t.deskripsi || t.kategori}</div>
                        <div class="act-date">${getBukuName(t.buku_id, buku)} • ${new Date(t.tanggal).toLocaleString('id-ID')}</div>
                    </div>
                    <div class="act-amount" style="color:${t.tipe === 'masuk' ? '#10b981' : '#ef4444'};">
                        ${t.tipe === 'masuk' ? '+' : '-'}${formatRupiah(t.nominal)}
                    </div>
                </div>
            `).join('');
        }

        function refreshCurrentPage() {
            const active = document.querySelector('.page.active');
            if (active.id === 'page-dashboard') renderDashboard();
            else if (active.id === 'page-buku-kas') { renderBukuKasList(); renderTransaksiTable(); }
            else if (active.id === 'page-utang-piutang') renderUtangPiutang();
            else if (active.id === 'page-laporan') renderLaporan();
        }

        // ==================== MODAL ====================
        let modalMode = '';

        function openModal(mode) {
            modalMode = mode;
            const modal = document.getElementById('modalTransaksi');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            if (mode === 'buku') {
                title.textContent = 'Tambah Buku Kas';
                body.innerHTML = `
                    <label>Nama Buku Kas</label>
                    <input type="text" id="f_nama_buku" placeholder="Contoh: Bank Mandiri">
                    <label>Saldo Awal (Rp)</label>
                    <input type="number" id="f_saldo_buku" placeholder="0">
                `;
            } else if (mode === 'transaksi') {
                title.textContent = 'Tambah Transaksi';
                supabase.from('buku_kas').select('*').then(res => {
                    const options = res.data.map(b => `<option value="${b.id}">${b.nama}</option>`).join('');
                    body.innerHTML = `
                        <label>Tanggal</label>
                        <input type="datetime-local" id="f_tanggal" value="${new Date().toISOString().slice(0,16)}">
                        <label>Buku Kas</label>
                        <select id="f_buku">${options}</select>
                        <label>Tipe</label>
                        <select id="f_tipe">
                            <option value="masuk">💰 Pemasukan</option>
                            <option value="keluar">💸 Pengeluaran</option>
                        </select>
                        <label>Nominal (Rp)</label>
                        <input type="number" id="f_nominal" placeholder="100000">
                        <label>Kategori</label>
                        <input type="text" id="f_desc" placeholder="Makan, Gaji, dll">
                    `;
                });
            } else if (mode === 'utang') {
                title.textContent = 'Tambah Utang';
                body.innerHTML = `
                    <label>Nama Kreditor</label>
                    <input type="text" id="f_nama" placeholder="Nama">
                    <label>Nominal (Rp)</label>
                    <input type="number" id="f_nominal" placeholder="500000">
                    <label>Jatuh Tempo</label>
                    <input type="date" id="f_jatuhTempo">
                `;
            } else if (mode === 'piutang') {
                title.textContent = 'Tambah Piutang';
                body.innerHTML = `
                    <label>Nama Debitur</label>
                    <input type="text" id="f_nama" placeholder="Nama">
                    <label>Nominal (Rp)</label>
                    <input type="number" id="f_nominal" placeholder="750000">
                    <label>Jatuh Tempo</label>
                    <input type="date" id="f_jatuhTempo">
                `;
            }
            modal.classList.add('open');
        }

        function closeModal() { document.getElementById('modalTransaksi').classList.remove('open'); }

        async function saveModal() {
            if (modalMode === 'buku') {
                const nama = document.getElementById('f_nama_buku').value.trim();
                const saldo = parseInt(document.getElementById('f_saldo_buku').value) || 0;
                if (!nama) { alert('Nama wajib diisi!'); return; }
                await supabase.from('buku_kas').insert({ nama, saldo, icon: 'fa-university' });
                closeModal(); refreshCurrentPage(); alert('Buku kas berhasil ditambah!');
            } else if (modalMode === 'transaksi') {
                const tanggal = document.getElementById('f_tanggal').value;
                const bukuId = document.getElementById('f_buku').value;
                const tipe = document.getElementById('f_tipe').value;
                const nominal = parseInt(document.getElementById('f_nominal').value);
                const desc = document.getElementById('f_desc').value || 'Tanpa keterangan';
                if (!tanggal || !nominal || nominal <= 0) { alert('Isi dengan benar!'); return; }
                
                // Update saldo
                const { data: buku } = await supabase.from('buku_kas').select('*').eq('id', bukuId);
                if (buku && buku[0]) {
                    const newSaldo = tipe === 'masuk' ? buku[0].saldo + nominal : buku[0].saldo - nominal;
                    await supabase.from('buku_kas').update({ saldo: newSaldo }).eq('id', bukuId);
                }
                await supabase.from('transaksi').insert({ tanggal, buku_id: bukuId, tipe, nominal, kategori: desc, deskripsi: desc });
                closeModal(); refreshCurrentPage(); alert('Transaksi berhasil ditambah!');
            } else if (modalMode === 'utang') {
                const nama = document.getElementById('f_nama').value.trim();
                const nominal = parseInt(document.getElementById('f_nominal').value);
                const jatuhTempo = document.getElementById('f_jatuhTempo').value;
                if (!nama || !nominal || !jatuhTempo) { alert('Lengkapi data!'); return; }
                await supabase.from('utang_piutang').insert({ nama, nominal, jatuh_tempo: jatuhTempo, tipe: 'utang', lunas: false });
                closeModal(); refreshCurrentPage(); alert('Utang berhasil ditambah!');
            } else if (modalMode === 'piutang') {
                const nama = document.getElementById('f_nama').value.trim();
                const nominal = parseInt(document.getElementById('f_nominal').value);
                const jatuhTempo = document.getElementById('f_jatuhTempo').value;
                if (!nama || !nominal || !jatuhTempo) { alert('Lengkapi data!'); return; }
                await supabase.from('utang_piutang').insert({ nama, nominal, jatuh_tempo: jatuhTempo, tipe: 'piutang', lunas: false });
                closeModal(); refreshCurrentPage(); alert('Piutang berhasil ditambah!');
            }
        }

        // ==================== INIT ====================
        document.getElementById('tanggalHariIni').textContent = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        refreshCurrentPage();
    </script>
</body>
</html>
